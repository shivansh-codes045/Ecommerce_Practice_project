name: Python Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-tests:
    name: Run Pytest & Collect Results
    runs-on: ubuntu-latest

    steps:
    # Step 1: Clone your repository onto the temporary Linux runner
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Configure Python cleanly (Fixed step)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    # Step 3: Install all your automation dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest pytest-html

    # Step 4: Run your test suite and generate an HTML report matrix
    - name: Run Pytest
      run: |
        pytest --html=reports/html-report.html --self-contained-html
      continue-on-error: true

    # Step 5: Save the generated verification reports as pipeline artifacts
    - name: Upload Test Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pytest-html-report
        path: reports/html-report.html
        retention-days: 14