name: Python Test Suite

# 1. Trigger the workflow on any push or pull request to the main branch
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
    commits:
      - '**' # Trigger on any commit message  

jobs:
  run-tests:
    name: Run Pytest & Collect Results
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository code so the runner can access it
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Set up the Python environment
    - name: Set up Python
      uses: actions/github-script@v7  # Fallback helper, but standard action is below:
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Automatically caches dependencies to speed up future runs

    # Step 3: Install dependencies (including pytest and any reporting tools)
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Ensure pytest and reporting packages are installed if not in requirements.txt
        pip install pytest pytest-html allure-pytest

    # Step 4: Execute Pytest and generate standard JUnit XML and HTML reports
    # The --junitxml flag generates machine-readable data for GitHub to display
    - name: Run Pytest
      run: |
        pytest --junitxml=reports/junit-report.xml --html=reports/html-report.html --self-contained-html
      continue-on-error: true # Ensures the pipeline continues to step 5 even if tests fail

    # Step 5: Publish the Interactive HTML report as a Job Artifact
    - name: Upload Test Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pytest-html-report
        path: reports/html-report.html
        retention-days: 14

    # Step 6: Fail the build cleanly if the tests actually failed
    - name: Check Test Status
      run: |
        # If you want the workflow badge to show red when tests fail
        pytest --junitxml=reports/junit-report.xml